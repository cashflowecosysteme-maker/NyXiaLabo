name = "nyxialabo"
main = "_worker.js"
compatibility_date = "2026-07-01"

# Sert les fichiers statiques (login.html, dashboard.html, js/) via env.ASSETS.fetch()
# dans _worker.js. "directory" pointe vers la racine du repo où sont ces fichiers.
[assets]
directory = "./"
binding = "ASSETS"

# Remplace "75b93baac0974f8cb8d1f2089eceb4e6" par l'ID copié depuis
# Stockage et bases de données → KV → HUB_CONFIG dans le dashboard Cloudflare.
[[kv_namespaces]]
binding = "HUB_CONFIG"
id = "75b93baac0974f8cb8d1f2089eceb4e6"

# Secrets à définir dans le dashboard de CE Worker (nyxialabo) :
# Settings → Variables and Secrets → Add variable → type "Secret"
#   ADMIN_PASSWORD
#   SESSION_SECRET
#   OPENROUTER_API_KEY
#   AIMLAPI_API_KEY
