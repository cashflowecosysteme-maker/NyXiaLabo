<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/FavIcon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox IA — Mon Espace de Test</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #0A1628; --bg2: #0F1C3F; --bg3: #1A2554; --sidebar: #080f22;
      --p: #7B5CFF; --p2: #5A6CFF; --p3: #4FA3FF; --glow: rgba(123,92,255,0.4);
      --t: #FFFFFF; --t2: #D6D9F0; --t3: #8891B8; --t4: #4a5278;
      --green: #00E676; --gold: #F4C842; --red: #FF4B6E; --r: 14px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg1); color: var(--t2); font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }
    #starry-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    header {
      position: relative; z-index: 100; height: 56px;
      background: rgba(8,15,34,0.95); border-bottom: 1px solid rgba(123,92,255,0.12);
      backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px 0 0; flex-shrink: 0;
    }
    .header-brand { width: 240px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 0 16px; border-right: 1px solid rgba(123,92,255,0.1); height: 100%; }
    .header-brand .badge {
      width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 15px; background: linear-gradient(135deg, var(--p), var(--p2));
      box-shadow: 0 0 20px rgba(123,92,255,0.4); animation: breathe 3s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes breathe { 0%,100% { box-shadow: 0 0 20px rgba(123,92,255,0.4); } 50% { box-shadow: 0 0 35px rgba(123,92,255,0.7), 0 0 60px rgba(123,92,255,0.2); } }
    .brand-info { line-height: 1.2; }
    .brand-name { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, var(--p3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .brand-status { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 4px; }
    .brand-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse-green 2s ease-in-out infinite; }
    @keyframes pulse-green { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .header-center { flex: 1; display: flex; align-items: center; justify-content: center; }
    .welcome-text { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: var(--t3); }
    .welcome-text strong { color: var(--gold); font-style: normal; font-weight: 600; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn-header { padding: 6px 16px; border-radius: 50px; border: none; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; text-decoration: none; }
    .btn-logout { background: rgba(255,75,110,0.1); border: 1px solid rgba(255,75,110,0.25); color: #ff8fab; }
    .btn-logout:hover { background: rgba(255,75,110,0.2); }

    .app-body { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }
    aside { width: 240px; flex-shrink: 0; background: rgba(8,15,34,0.97); border-right: 1px solid rgba(123,92,255,0.1); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
    .sidebar-section { padding: 20px 12px 8px; }
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--t4); text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all .2s; color: var(--t3); font-size: 14px; font-weight: 500; border: 1px solid transparent; margin-bottom: 2px; user-select: none; }
    .nav-item:hover { background: rgba(123,92,255,0.08); color: var(--t2); border-color: rgba(123,92,255,0.1); }
    .nav-item.active { background: rgba(123,92,255,0.15); color: var(--t); border-color: rgba(123,92,255,0.3); box-shadow: 0 0 16px rgba(123,92,255,0.1); }
    .nav-item .nav-icon { font-size: 16px; flex-shrink: 0; }
    .sidebar-divider { height: 1px; background: rgba(123,92,255,0.08); margin: 8px 12px; }

    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .panel-header { padding: 16px 24px; border-bottom: 1px solid rgba(123,92,255,0.1); background: rgba(10,22,40,0.6); backdrop-filter: blur(10px); flex-shrink: 0; }
    .panel-header-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; background: linear-gradient(135deg, #a78bfa, var(--p3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .panel-header-sub { font-size: 12px; color: var(--t3); margin-top: 2px; }

    .test-area { flex: 1; overflow-y: auto; padding: 24px; max-width: 780px; width: 100%; margin: 0 auto; }
    .row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 180px; }
    .field.small { flex: 0 0 120px; min-width: 120px; }
    label.f-label { font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 6px; }
    select, textarea, input[type=number] {
      width: 100%; background: rgba(15,28,63,0.7); border: 1px solid rgba(123,92,255,0.2); border-radius: 12px;
      color: var(--t); font-family: 'Outfit', sans-serif; font-size: 14px; padding: 11px 14px; outline: none;
      transition: border-color .2s;
    }
    select:focus, textarea:focus, input:focus { border-color: rgba(123,92,255,0.5); }
    textarea { min-height: 130px; resize: vertical; line-height: 1.5; }

    .btn-run {
      padding: 13px 28px; border-radius: 50px; border: none; background: linear-gradient(135deg, var(--p), var(--p2));
      color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
      box-shadow: 0 0 24px rgba(123,92,255,0.4); transition: all .25s; display: flex; align-items: center; gap: 8px;
    }
    .btn-run:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 0 36px rgba(123,92,255,0.6); }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }
    .spinner-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      margin-top: 24px; background: rgba(26,37,84,0.5); border: 1px solid rgba(123,92,255,0.15);
      border-radius: 16px; padding: 20px; white-space: pre-wrap; font-size: 14px; line-height: 1.65; min-height: 60px;
    }
    .result-meta { display: flex; gap: 18px; margin-top: 12px; font-size: 12px; color: var(--t4); flex-wrap: wrap; }
    .result-meta b { color: var(--t3); }
    .result-error { color: #ff8fab; }

    @media (max-width: 768px) {
      aside { width: 200px; } .header-brand { width: 200px; } .header-center { display: none; }
      .test-area { padding: 16px; }
    }
    @media (max-width: 600px) { aside { display: none; } .header-brand { width: auto; border: none; } }
  </style>
</head>
<body>

  <canvas id="starry-canvas"></canvas>

  <header>
    <div class="header-brand">
      <div class="badge">🧪</div>
      <div class="brand-info">
        <div class="brand-name">Sandbox IA</div>
        <div class="brand-status">En ligne</div>
      </div>
    </div>
    <div class="header-center">
      <div class="welcome-text">Espace de test ✦ <strong>Diane</strong></div>
    </div>
    <div class="header-actions">
      <button class="btn-header btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="app-body">
    <aside>
      <div class="sidebar-section">
        <div class="sidebar-label">Divisions</div>
        <div id="nav-list"></div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Outils</div>
        <div class="nav-item" id="nav-explore" onclick="showExplore()">
          <span class="nav-icon">🔎</span> Explorer les modèles
        </div>
      </div>
    </aside>

    <div class="main-content">
      <div class="panel-header">
        <div class="panel-header-name" id="panel-title">Conversation</div>
        <div class="panel-header-sub" id="panel-sub">Teste un prompt sur n'importe quel modèle de cette division</div>
      </div>

      <div class="test-area">
        <div class="row">
          <div class="field">
            <label class="f-label">Fournisseur</label>
            <select id="provider"></select>
          </div>
          <div class="field">
            <label class="f-label">Modèle</label>
            <select id="model"></select>
          </div>
        </div>
        <div class="row">
          <div class="field small">
            <label class="f-label">Max tokens</label>
            <input type="number" id="maxTokens" value="2000">
          </div>
          <div class="field small">
            <label class="f-label">Température</label>
            <input type="number" id="temperature" value="0.7" step="0.1" min="0" max="2">
          </div>
        </div>

        <label class="f-label">Prompt</label>
        <textarea id="prompt" placeholder="Écris ton prompt de test ici..."></textarea>

        <div style="margin-top:16px">
          <button class="btn-run" id="btn-run" onclick="runTest()">
            <div class="spinner-sm" id="spinner"></div>
            <span id="run-text">Lancer le test</span>
          </button>
        </div>

        <div class="result-card" id="result">—</div>
        <div class="result-meta" id="result-meta"></div>
      </div>
    </div>
  </div>

  <script src="/js/starry-bg.js" defer></script>

  <script>
    var sessionToken = sessionStorage.getItem('sandbox_token') || ''
    var config = { providers: [] }
    var currentDivision = 'conversation'
    var exploreMode = false

    var DIVISION_LABELS = {
      conversation: { icon: '💬', name: 'Conversation', sub: "Chat libre — Claude, GPT, Gemini, Z (GLM)" },
      livre: { icon: '📖', name: 'Écriture de livre', sub: "Génération longue — jusqu'à un chapitre complet" },
      narration: { icon: '🎭', name: 'Narration & personnages', sub: "Continuité narrative, univers, dialogues" },
      image: { icon: '🎨', name: "Génération d'image", sub: "À configurer — division en attente d'intégration" },
      video: { icon: '🎬', name: 'Génération vidéo', sub: "À configurer — division en attente d'intégration" }
    }

    ;(function checkAuth() {
      if (!sessionToken) { window.location.href = '/login.html'; return }
      fetch('/api/check-auth', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: sessionToken })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        if (!data.valid) { window.location.href = '/login.html'; return }
        loadConfig()
      })
      .catch(function () { window.location.href = '/login.html' })
    })()

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken }
    }

    function logout() {
      sessionStorage.removeItem('sandbox_token')
      window.location.href = '/login.html'
    }

    function loadConfig() {
      fetch('/api/config', { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          config = data
          renderNav()
          renderProviders()
        })
    }

    function allDivisions() {
      var set = {}
      config.providers.forEach(function (p) {
        (p.featured_models || []).forEach(function (m) { set[m.division || 'autre'] = true })
      })
      return Object.keys(set)
    }

    function renderNav() {
      var navList = document.getElementById('nav-list')
      navList.innerHTML = ''
      var divisions = allDivisions()
      if (divisions.indexOf(currentDivision) === -1) currentDivision = divisions[0] || 'conversation'
      divisions.forEach(function (d) {
        var meta = DIVISION_LABELS[d] || { icon: '⚙️', name: d, sub: '' }
        var el = document.createElement('div')
        el.className = 'nav-item' + (!exploreMode && d === currentDivision ? ' active' : '')
        el.innerHTML = '<span class="nav-icon">' + meta.icon + '</span> ' + meta.name
        el.onclick = function () { exploreMode = false; currentDivision = d; renderNav(); renderProviders(); updateHeader() }
        navList.appendChild(el)
      })
      document.getElementById('nav-explore').classList.toggle('active', exploreMode)
      updateHeader()
    }

    function updateHeader() {
      if (exploreMode) {
        document.getElementById('panel-title').textContent = 'Explorer les modèles'
        document.getElementById('panel-sub').textContent = "Catalogue brut d'un fournisseur (ex. les 600+ modèles OpenRouter)"
        return
      }
      var meta = DIVISION_LABELS[currentDivision] || { name: currentDivision, sub: '' }
      document.getElementById('panel-title').textContent = meta.name
      document.getElementById('panel-sub').textContent = meta.sub
    }

    function showExplore() {
      exploreMode = true
      renderNav()
      // simple : redirige la liste de modèles vers l'endpoint brut
      var out = document.getElementById('result')
      out.textContent = 'Chargement du catalogue...'
      var providerId = document.getElementById('provider').value || 'openrouter'
      fetch('/api/models?provider=' + providerId, { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          var list = (data.data || []).map(function (m) { return m.id }).slice(0, 200)
          out.textContent = list.length ? list.join('\\n') : JSON.stringify(data, null, 2)
        })
        .catch(function (e) { out.textContent = 'Erreur : ' + e.message })
    }

    function renderProviders() {
      var providerSel = document.getElementById('provider')
      providerSel.innerHTML = ''
      config.providers.forEach(function (p) {
        var opt = document.createElement('option')
        opt.value = p.id; opt.textContent = p.name
        providerSel.appendChild(opt)
      })
      providerSel.onchange = renderModels
      renderModels()
    }

    function renderModels() {
      var providerId = document.getElementById('provider').value
      var provider = config.providers.find(function (p) { return p.id === providerId })
      var modelSel = document.getElementById('model')
      modelSel.innerHTML = ''
      var models = (provider && provider.featured_models || []).filter(function (m) { return m.division === currentDivision })
      if (!models.length) models = (provider && provider.featured_models) || []
      models.forEach(function (m) {
        var opt = document.createElement('option')
        opt.value = m.id; opt.textContent = m.label
        modelSel.appendChild(opt)
      })
    }

    function runTest() {
      var btn = document.getElementById('btn-run')
      var spinner = document.getElementById('spinner')
      var runText = document.getElementById('run-text')
      var result = document.getElementById('result')
      var meta = document.getElementById('result-meta')
      var prompt = document.getElementById('prompt').value.trim()
      if (!prompt) return

      btn.disabled = true; spinner.style.display = 'block'; runText.textContent = 'En cours...'
      result.textContent = '…'; result.className = 'result-card'; meta.innerHTML = ''

      fetch('/api/chat', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({
          providerId: document.getElementById('provider').value,
          model: document.getElementById('model').value,
          messages: [{ role: 'user', content: prompt }],
          max_tokens: Number(document.getElementById('maxTokens').value) || 2000,
          temperature: Number(document.getElementById('temperature').value)
        })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        if (data.error) {
          result.textContent = 'Erreur : ' + data.error
          result.className = 'result-card result-error'
        } else {
          result.textContent = data.text || '(réponse vide)'
          var u = data.usage
          meta.innerHTML =
            '<span>Temps : <b>' + (data.elapsedMs / 1000).toFixed(1) + 's</b></span>' +
            (u ? '<span>Tokens entrée : <b>' + (u.prompt_tokens ?? '?') + '</b></span><span>Tokens sortie : <b>' + (u.completion_tokens ?? '?') + '</b></span>' : '') +
            '<span>Caractères sortie : <b>' + (data.text || '').length + '</b></span>'
        }
      })
      .catch(function (e) {
        result.textContent = 'Erreur réseau : ' + e.message
        result.className = 'result-card result-error'
      })
      .finally(function () {
        btn.disabled = false; spinner.style.display = 'none'; runText.textContent = 'Lancer le test'
      })
    }
  </script>

</body>
</html>
