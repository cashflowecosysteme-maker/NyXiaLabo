<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/FavIcon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox IA — Mon Espace de Test</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #0A1628; --bg2: #0F1C3F; --bg3: #1A2554; --sidebar: #080f22;
      --p: #7B5CFF; --p2: #5A6CFF; --p3: #4FA3FF;
      --t: #FFFFFF; --t2: #D6D9F0; --t3: #8891B8; --t4: #4a5278;
      --green: #00E676; --gold: #F4C842; --red: #FF4B6E;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg1); color: var(--t2); font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }
    #starry-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    header { position: relative; z-index: 100; height: 56px; background: rgba(8,15,34,0.95); border-bottom: 1px solid rgba(123,92,255,0.12); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px 0 0; flex-shrink: 0; }
    .header-brand { width: 240px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 0 16px; border-right: 1px solid rgba(123,92,255,0.1); height: 100%; }
    .header-brand .badge { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; background: linear-gradient(135deg, var(--p), var(--p2)); box-shadow: 0 0 20px rgba(123,92,255,0.4); }
    .brand-name { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #a78bfa, var(--p3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .brand-status { font-size: 11px; color: var(--green); }
    .header-center { flex: 1; display: flex; align-items: center; justify-content: center; }
    .welcome-text { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: var(--t3); }
    .welcome-text strong { color: var(--gold); font-style: normal; font-weight: 600; }
    .btn-header { padding: 6px 16px; border-radius: 50px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-logout { background: rgba(255,75,110,0.1); border: 1px solid rgba(255,75,110,0.25); color: #ff8fab; }

    .app-body { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }
    aside { width: 250px; flex-shrink: 0; background: rgba(8,15,34,0.97); border-right: 1px solid rgba(123,92,255,0.1); display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-section { padding: 16px 12px 6px; }
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--t4); text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; color: var(--t3); font-size: 13.5px; font-weight: 500; border: 1px solid transparent; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(123,92,255,0.08); color: var(--t2); }
    .nav-item.active { background: rgba(123,92,255,0.15); color: var(--t); border-color: rgba(123,92,255,0.3); }
    .sidebar-divider { height: 1px; background: rgba(123,92,255,0.08); margin: 8px 12px; }
    .cat-select { width: 100%; padding: 8px 10px; font-size: 12.5px; border-radius: 8px; }
    .cat-select.active { border-color: rgba(123,92,255,0.55); box-shadow: 0 0 0 2px rgba(123,92,255,0.12); color: var(--t); }

    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { padding: 14px 24px; border-bottom: 1px solid rgba(123,92,255,0.1); background: rgba(10,22,40,0.6); flex-shrink: 0; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .panel-header-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; background: linear-gradient(135deg, #a78bfa, var(--p3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .panel-header-sub { font-size: 12px; color: var(--t3); margin-top: 2px; }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

    .btn-mini { padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(123,92,255,0.25); background: rgba(123,92,255,0.08); color: var(--t2); font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-mini:hover { background: rgba(123,92,255,0.16); }
    .btn-primary { padding: 10px 20px; border-radius: 50px; border: none; background: linear-gradient(135deg, var(--p), var(--p2)); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 0 20px rgba(123,92,255,0.35); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-danger { padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,75,110,0.3); background: rgba(255,75,110,0.08); color: #ff8fab; font-size: 12px; cursor: pointer; }

    /* Chat */
    .chat-messages { display: flex; flex-direction: column; gap: 14px; max-width: 760px; margin: 0 auto; }
    .msg { display: flex; gap: 10px; max-width: 82%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .msg-bubble { padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .msg.bot .msg-bubble { background: rgba(26,37,84,0.7); border: 1px solid rgba(123,92,255,0.12); border-top-left-radius: 4px; }
    .msg.user .msg-bubble { background: linear-gradient(135deg, var(--p), var(--p2)); color: #fff; border-top-right-radius: 4px; }
    .chat-input-wrap { max-width: 760px; margin: 16px auto 0; display: flex; gap: 10px; align-items: flex-end; }
    .chat-input { flex: 1; background: rgba(15,28,63,0.7); border: 1px solid rgba(123,92,255,0.2); border-radius: 14px; color: var(--t); font-size: 14px; padding: 12px 16px; outline: none; resize: none; min-height: 46px; max-height: 140px; font-family: inherit; }
    .btn-send { width: 44px; height: 44px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--p), var(--p2)); color: #fff; cursor: pointer; font-size: 16px; flex-shrink:0; }
    .btn-send:disabled { opacity: .5; }
    .chat-empty { max-width: 760px; margin: 40px auto; text-align: center; color: var(--t4); font-size: 13px; }
    .tool-settings-toggle { max-width: 760px; margin: 0 auto 16px; }
    .tool-settings { max-width: 760px; margin: 0 auto 16px; background: rgba(26,37,84,0.4); border: 1px solid rgba(123,92,255,0.12); border-radius: 12px; padding: 14px; display: none; }
    .tool-settings.open { display: block; }
    .tool-settings textarea { width: 100%; min-height: 90px; }

    /* Forms & tables */
    label.f-label { font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-bottom: 6px; }
    select, textarea, input[type=text], input[type=number] { width: 100%; background: rgba(15,28,63,0.7); border: 1px solid rgba(123,92,255,0.2); border-radius: 10px; color: var(--t); font-size: 14px; padding: 10px 13px; outline: none; font-family: inherit; }
    .field { margin-bottom: 14px; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--t4); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 1px solid rgba(123,92,255,0.15); }
    td { padding: 10px; border-bottom: 1px solid rgba(123,92,255,0.06); color: var(--t2); }
    .row-actions { display: flex; gap: 6px; }
    .form-card { background: rgba(26,37,84,0.4); border: 1px solid rgba(123,92,255,0.15); border-radius: 14px; padding: 20px; max-width: 600px; margin-top: 16px; }

    .result-box { background: rgba(26,37,84,0.5); border: 1px solid rgba(123,92,255,0.15); border-radius: 14px; padding: 16px; white-space: pre-wrap; font-size: 13px; line-height: 1.6; max-height: 500px; overflow-y: auto; }
    .pexels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; margin-top: 16px; }
    .pexels-item img { width: 100%; border-radius: 10px; display: block; }
    .pexels-item { font-size: 11px; color: var(--t4); }
    .pexels-item a { color: var(--t3); text-decoration: none; }

    @media (max-width: 768px) { aside { width: 210px; } .header-center { display: none; } }
    @media (max-width: 600px) { aside { display: none; } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <canvas id="starry-canvas"></canvas>

  <header>
    <div class="header-brand">
      <div class="badge">🧪</div>
      <div><div class="brand-name">Sandbox IA</div><div class="brand-status">● En ligne</div></div>
    </div>
    <div class="header-center"><div class="welcome-text">Espace de test ✦ <strong>Diane</strong></div></div>
    <div><button class="btn-header btn-logout" onclick="logout()">Déconnexion</button></div>
  </header>

  <div class="app-body">
    <aside id="sidebar"></aside>
    <div class="main-content">
      <div class="panel-header">
        <div>
          <div class="panel-header-name" id="panel-title">—</div>
          <div class="panel-header-sub" id="panel-sub"></div>
        </div>
        <div id="panel-actions"></div>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>

  <script src="/js/starry-bg.js" defer></script>

  <script>
    var sessionToken = sessionStorage.getItem('sandbox_token') || ''
    var tools = [], providers = []
    var chatHistories = {} // toolId -> [{role, content}]
    var currentView = 'chat', currentToolId = null

    var CATEGORY_LABELS = {
      conversation: { icon: '💬', name: 'Conversation' },
      livre: { icon: '📖', name: 'Écriture de livre' },
      narration: { icon: '🎭', name: 'Narration & personnages' },
      consultation: { icon: '🧭', name: 'Outils Consultation' },
      exercices: { icon: '✨', name: "Générateur d'exercices" },
      contenu: { icon: '🖋️', name: 'Outils création contenu' },
      publication: { icon: '📣', name: 'Publication de contenu' }
    }

    ;(function checkAuth() {
      if (!sessionToken) { window.location.href = '/login.html'; return }
      fetch('/api/check-auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sessionToken }) })
        .then(function (r) { return r.json() })
        .then(function (data) { if (!data.valid) { window.location.href = '/login.html'; return } loadAll() })
        .catch(function () { window.location.href = '/login.html' })
    })()

    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + sessionToken } }
    function logout() { sessionStorage.removeItem('sandbox_token'); window.location.href = '/login.html' }
    function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML }

    function loadAll() {
      Promise.all([
        fetch('/api/tools', { headers: authHeaders() }).then(function(r){ return r.json() }),
        fetch('/api/providers', { headers: authHeaders() }).then(function(r){ return r.json() })
      ]).then(function (results) {
        tools = results[0].tools || []
        providers = results[1].providers || []
        renderSidebar()
        if (tools.length) selectTool(tools[0].id)
        else showToolsManager()
      })
    }

    /* ═══════ SIDEBAR (une ligne par catégorie, menu déroulant pour les outils) ═══════ */
    function renderSidebar() {
      var el = document.getElementById('sidebar')
      var byCategory = {}
      tools.forEach(function (t) { if (t.category === 'transcription') return; (byCategory[t.category] = byCategory[t.category] || []).push(t) })
      var currentTool = tools.find(function (t) { return t.id === currentToolId })

      var html = ''
      Object.keys(byCategory).forEach(function (cat) {
        var meta = CATEGORY_LABELS[cat] || { icon: '⚙️', name: cat.charAt(0).toUpperCase() + cat.slice(1) }
        var isActiveCat = currentView === 'chat' && currentTool && currentTool.category === cat
        var options = (!isActiveCat ? '<option value="" disabled selected>' + byCategory[cat].length + ' outil(s)</option>' : '') +
          byCategory[cat].map(function (t) {
            return '<option value="' + t.id + '"' + (isActiveCat && currentToolId === t.id ? ' selected' : '') + '>' + t.icon + ' ' + esc(t.name) + '</option>'
          }).join('')
        html += '<div class="sidebar-section">' +
          '<div class="sidebar-label">' + meta.icon + ' ' + esc(meta.name) + '</div>' +
          '<select class="cat-select' + (isActiveCat ? ' active' : '') + '" onchange="selectTool(this.value)">' + options + '</select>' +
          '</div>'
      })

      var MGMT_ITEMS = [
        { view: 'tools', icon: '🧰', label: 'Outils' },
        { view: 'providers', icon: '🔌', label: 'Fournisseurs' },
        { view: 'explore', icon: '🔎', label: 'Explorer modèles' },
        { view: 'transcription', icon: '🎙️', label: 'Transcription' },
        { view: 'customtools', icon: '🧩', label: 'Outils API (coller un cURL)' },
        { view: 'heygen', icon: '🧑\u200d🎤', label: 'Clone IA (HeyGen)' },
        { view: 'wan-video', icon: '🎬', label: 'Wan — Vidéo' },
        { view: 'wan-image', icon: '🎨', label: 'Wan — Image' }
      ]
      var mgmtActive = MGMT_ITEMS.some(function (m) { return m.view === currentView })
      var mgmtOptions = (!mgmtActive ? '<option value="" disabled selected>' + MGMT_ITEMS.length + ' outil(s)</option>' : '') +
        MGMT_ITEMS.map(function (m) {
          return '<option value="' + m.view + '"' + (mgmtActive && currentView === m.view ? ' selected' : '') + '>' + m.icon + ' ' + m.label + '</option>'
        }).join('')

      html += '<div class="sidebar-divider"></div><div class="sidebar-section">' +
        '<div class="sidebar-label">🛠️ Gestion</div>' +
        '<select class="cat-select' + (mgmtActive ? ' active' : '') + '" onchange="goToManagement(this.value)">' + mgmtOptions + '</select>' +
        '</div>'

      el.innerHTML = html
    }
    function goToManagement(view) {
      var fnMap = {
        tools: toolsView, providers: providersView, explore: exploreView,
        heygen: heygenView, 'wan-video': wanVideoView, 'wan-image': wanImageView,
        transcription: function () { var t = tools.find(function (x) { return x.id === 'stt-whisper' }); if (t) renderTranscribeTool(t) },
        customtools: customToolsView
      }
      if (fnMap[view]) fnMap[view]()
    }

    /* ═══════ CHAT ═══════ */
    function selectTool(id) {
      currentView = 'chat'; currentToolId = id
      renderSidebar()
      var tool = tools.find(function (t) { return t.id === id })
      if (tool && tool.kind === 'image') { renderImageTool(tool); return }
      if (tool && tool.kind === 'image-async') { renderImageTool(tool); return }
      if (tool && tool.kind === 'audio') { renderAudioTool(tool); return }
      if (tool && tool.kind === 'audio-search') { renderAudioSearchTool(tool); return }
      if (tool && tool.kind === 'video') { renderVideoTool(tool); return }
      if (tool && tool.kind === 'pexels') { pexelsView(); return }
      if (tool && tool.kind === 'unsplash') { renderUnsplashTool(tool); return }
      if (tool && tool.kind === 'esoteric') { renderEsotericTool(tool); return }
      if (tool && tool.kind === 'transcribe') { renderTranscribeTool(tool); return }
      if (tool && tool.kind === 'apyhub') { renderApyHubTool(tool); return }
      if (tool && tool.kind === 'rapidapi') { renderRapidApiTool(tool); return }
      if (tool && tool.kind === 'custom-api') { renderCustomApiUseTool(tool); return }
      renderChatTool(tool)
    }

    function renderChatTool(tool) {
      document.getElementById('panel-title').textContent = tool.name
      document.getElementById('panel-sub').textContent = (providers.find(function(p){return p.id===tool.providerId}) || {}).name + ' · ' + tool.model
      document.getElementById('panel-actions').innerHTML =
        '<button class="btn-mini" onclick="exportChatPDF()">📄 PDF</button> ' +
        '<button class="btn-mini" onclick="toggleToolSettings()">⚙️ Réglages</button> ' +
        '<button class="btn-mini" onclick="clearChat()">🗑️ Effacer</button>'

      var history = chatHistories[tool.id] || []
      var body = '<div class="tool-settings" id="tool-settings">' +
        '<label class="f-label">Prompt système</label>' +
        '<textarea id="settings-prompt" onchange="updateToolField(\'system_prompt\', this.value)">' + esc(tool.system_prompt) + '</textarea>' +
        '<div class="field-row" style="margin-top:10px">' +
          '<div class="field"><label class="f-label">Max tokens</label><input type="number" id="settings-maxtokens" value="' + tool.max_tokens + '" onchange="updateToolField(\'max_tokens\', Number(this.value))"></div>' +
          '<div class="field"><label class="f-label">Température</label><input type="number" step="0.1" id="settings-temp" value="' + tool.temperature + '" onchange="updateToolField(\'temperature\', Number(this.value))"></div>' +
        '</div></div>' +
        '<div class="chat-messages" id="chat-messages">' +
        (history.length ? history.map(renderMsg).join('') : '<div class="chat-empty">Écris un message pour commencer la conversation avec ' + esc(tool.name) + '.</div>') +
        '</div>' +
        '<div id="attach-bar" style="display:none;padding:6px 0;max-width:760px;margin:0 auto;align-items:center;gap:8px;font-size:12px;color:var(--t3)">' +
          '<span id="attach-name"></span> <button onclick="clearAttachment()" style="background:none;border:none;color:var(--t4);cursor:pointer">✕</button>' +
        '</div>' +
        '<div class="chat-input-wrap">' +
          '<label title="Joindre une image" style="flex-shrink:0;width:44px;height:44px;border-radius:12px;border:1px solid rgba(123,92,255,0.2);background:rgba(123,92,255,0.06);color:var(--t3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px">' +
            '📎<input type="file" id="chat-file" accept="image/*" style="display:none" onchange="handleAttachment(event)">' +
          '</label>' +
          '<textarea class="chat-input" id="chat-input" rows="1" placeholder="Écris ton message..."></textarea>' +
          '<button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>' +
        '</div>'
      document.getElementById('panel-body').innerHTML = body

      var input = document.getElementById('chat-input')
      input.addEventListener('input', function () { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 140) + 'px' })
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } })
      input.focus()
    }

    /* ═══════ GÉNÉRATION D'IMAGE (même logique que les chats : switch de modèle, historique) ═══════ */
    var imageHistories = {} // toolId -> [{prompt, images, time}]

    function renderImageTool(tool) {
      document.getElementById('panel-title').textContent = tool.name
      document.getElementById('panel-sub').textContent = (providers.find(function (p) { return p.id === tool.providerId }) || {}).name + ' · ' + tool.model
      document.getElementById('panel-actions').innerHTML = '<button class="btn-mini" onclick="clearImageHistory()">🗑️ Effacer</button>'

      var history = imageHistories[tool.id] || []
      var body =
        '<div class="field-row" style="max-width:760px;margin:0 auto 12px">' +
          '<div class="field" style="flex:3"><label class="f-label">Prompt</label><textarea id="img-prompt" style="min-height:80px" placeholder="Décris l\'image que tu veux générer..."></textarea></div>' +
          '<div class="field" style="flex:1"><label class="f-label">Format</label><select id="img-ratio">' +
            ['1:1', '16:9', '9:16', '4:3', '3:4'].map(function (r) { return '<option value="' + r + '"' + (tool.aspect_ratio === r ? ' selected' : '') + '>' + r + '</option>' }).join('') +
          '</select></div>' +
        '</div>' +
        '<div style="max-width:760px;margin:0 auto 12px">' +
          '<label class="f-label">Image de référence (optionnel — pour garder le même personnage/style, ou cloner une photo)</label>' +
          '<input type="file" id="img-ref-file" accept="image/*" onchange="handleImgRefAttachment(event)">' +
          '<div id="img-ref-preview" style="margin-top:8px"></div>' +
        '</div>' +
        '<div style="max-width:760px;margin:0 auto 20px"><button class="btn-primary" id="img-gen-btn" onclick="generateImage()">🎨 Générer</button></div>' +
        '<div id="img-history" style="max-width:900px;margin:0 auto">' +
        (history.length ? history.map(renderImageEntry).reverse().join('') : '<div class="chat-empty">Aucune image générée avec ' + esc(tool.name) + ' pour l\'instant.</div>') +
        '</div>'
      document.getElementById('panel-body').innerHTML = body
      pendingImageGenRef = null
    }

    var pendingImageGenRef = null
    function handleImgRefAttachment(e) {
      var file = e.target.files[0]
      if (!file) return
      var reader = new FileReader()
      reader.onload = function () {
        pendingImageGenRef = reader.result
        document.getElementById('img-ref-preview').innerHTML =
          '<img src="' + reader.result + '" style="max-width:140px;border-radius:8px;display:block;margin-bottom:4px">' +
          '<button onclick="clearImgRefAttachment()" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:12px">✕ Retirer</button>'
      }
      reader.readAsDataURL(file)
    }
    function clearImgRefAttachment() {
      pendingImageGenRef = null
      document.getElementById('img-ref-file').value = ''
      document.getElementById('img-ref-preview').innerHTML = ''
    }

    function renderImageEntry(entry) {
      if (entry.pending) {
        return '<div style="margin-bottom:24px"><div style="font-size:13px;color:var(--t3);margin-bottom:8px">' + esc(entry.prompt) + '</div>' +
          '<div class="result-box">⏳ Génération en cours (Alexya peut prendre 5s à 3min selon le mode)...</div></div>'
      }
      if (entry.errorMsg) {
        return '<div style="margin-bottom:24px"><div style="font-size:13px;color:var(--t3);margin-bottom:8px">' + esc(entry.prompt) + '</div>' +
          '<div class="result-box result-error">' + esc(entry.errorMsg) + '</div></div>'
      }

        '<div style="font-size:13px;color:var(--t3);margin-bottom:8px">' + esc(entry.prompt) + '</div>' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">' + imgs + '</div></div>'

    function generateImage() {
      var tool = tools.find(function (t) { return t.id === currentToolId })
      var prompt = document.getElementById('img-prompt').value.trim()
      var ratio = document.getElementById('img-ratio').value
      if (!prompt) return
      var btn = document.getElementById('img-gen-btn')
      btn.disabled = true; btn.textContent = 'Génération en cours...'

      if (tool.kind === 'image-async') {
        fetch('/api/alexya/generate', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ toolId: tool.id, prompt: prompt, aspect_ratio: ratio })
        })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.error) { btn.disabled = false; btn.textContent = '🎨 Générer'; alert('Erreur : ' + data.error); return }
          imageHistories[tool.id] = imageHistories[tool.id] || []
          var entry = { prompt: prompt, images: [], time: Date.now(), pending: true }
          imageHistories[tool.id].push(entry)
          document.getElementById('img-prompt').value = ''
          renderImageTool(tool)
          pollAlexya(data.id, tool, entry, btn)
        })
        .catch(function (e) { btn.disabled = false; btn.textContent = '🎨 Générer'; alert('Erreur réseau : ' + e.message) })
        return
      }

      fetch('/api/generate-image', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ toolId: tool.id, prompt: prompt, aspect_ratio: ratio, image_urls: pendingImageGenRef ? [pendingImageGenRef] : undefined })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        btn.disabled = false; btn.textContent = '🎨 Générer'
        if (data.error) { alert('Erreur : ' + data.error); return }
        imageHistories[tool.id] = imageHistories[tool.id] || []
        imageHistories[tool.id].push({ prompt: prompt, images: data.images, time: Date.now() })
        document.getElementById('img-prompt').value = ''
        clearImgRefAttachment()
        renderImageTool(tool)
      })
      .catch(function (e) {
        btn.disabled = false; btn.textContent = '🎨 Générer'
        alert('Erreur réseau : ' + e.message)
      })
    }

    function pollAlexya(genId, tool, entry, btn, attempt) {
      attempt = attempt || 0
      if (attempt > 40) { entry.pending = false; entry.images = []; entry.errorMsg = 'Timeout — vérifie ton dashboard Alexya.'; renderImageTool(tool); btn.disabled = false; btn.textContent = '🎨 Générer'; return }
      fetch('/api/alexya/status?id=' + encodeURIComponent(genId), { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.status === 'completed' && data.output_url) {
            entry.pending = false; entry.images = [data.output_url]
            renderImageTool(tool); btn.disabled = false; btn.textContent = '🎨 Générer'
          } else if (data.status === 'failed' || data.error) {
            entry.pending = false; entry.errorMsg = data.error ? JSON.stringify(data.error) : 'Échec de la génération'
            renderImageTool(tool); btn.disabled = false; btn.textContent = '🎨 Générer'
          } else {
            setTimeout(function () { pollAlexya(genId, tool, entry, btn, attempt + 1) }, 4000)
          }
        })
        .catch(function () { setTimeout(function () { pollAlexya(genId, tool, entry, btn, attempt + 1) }, 6000) })
    }

    // Rendu markdown léger, sans dépendance externe — gras, italique, code, listes, liens, paragraphes
    function renderMarkdown(text) {
      var html = esc(text)
      html = html.replace(/```([\s\S]*?)```/g, function (m, code) { return '<pre style="background:rgba(0,0,0,0.25);padding:10px;border-radius:8px;overflow-x:auto"><code>' + code + '</code></pre>' })
      html = html.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.25);padding:1px 5px;border-radius:4px">$1</code>')
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      html = html.replace(/(^|[\s(])\*(?!\s)(.+?)(?<!\s)\*(?=[\s).,!?]|$)/g, '$1<em>$2</em>')
      html = html.replace(/^### (.+)$/gm, '<strong style="font-size:1.05em">$1</strong>')
      html = html.replace(/^## (.+)$/gm, '<strong style="font-size:1.1em">$1</strong>')
      html = html.replace(/^# (.+)$/gm, '<strong style="font-size:1.2em">$1</strong>')
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--p3)">$1</a>')
      // Listes à puces / numérotées : regroupe les lignes consécutives
      html = html.replace(/(^|\n)((?:[-*] .+(?:\n|$))+)/g, function (m, pre, block) {
        var items = block.trim().split(/\n/).map(function (l) { return '<li>' + l.replace(/^[-*]\s+/, '') + '</li>' }).join('')
        return pre + '<ul style="margin:6px 0;padding-left:20px">' + items + '</ul>'
      })
      html = html.replace(/(^|\n)((?:\d+\. .+(?:\n|$))+)/g, function (m, pre, block) {
        var items = block.trim().split(/\n/).map(function (l) { return '<li>' + l.replace(/^\d+\.\s+/, '') + '</li>' }).join('')
        return pre + '<ol style="margin:6px 0;padding-left:20px">' + items + '</ol>'
      })
      html = html.replace(/\n{2,}/g, '</p><p style="margin:8px 0 0">')
      html = html.replace(/\n/g, '<br>')
      return html
    }

    function renderMsg(m, idx) {
      var text = typeof m.content === 'string' ? m.content : (m.content.find(function (c) { return c.type === 'text' }) || {}).text || ''
      var img = typeof m.content === 'object' ? (m.content.find(function (c) { return c.type === 'image_url' }) || {}).image_url : null
      var imgHtml = img ? '<img src="' + img.url + '" style="max-width:220px;border-radius:10px;display:block;margin-bottom:6px">' : ''
      var speakBtn = (m.role !== 'user') ? '<button onclick="speakText(' + idx + ')" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:12px;margin-top:6px;padding:0" title="Écouter">🔊 Écouter</button>' : ''
      var pdfBtn = (m.role !== 'user') ? ' <button onclick="exportSingleMessagePDF(' + idx + ')" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:12px;margin-top:6px;padding:0" title="Exporter cette réponse en PDF">📄 PDF</button>' : ''
      var bodyHtml = m.role === 'user' ? esc(text) : renderMarkdown(text)
      return '<div class="msg ' + (m.role === 'user' ? 'user' : 'bot') + '"><div class="msg-bubble">' + imgHtml + bodyHtml + '<div>' + speakBtn + pdfBtn + '</div></div></div>'
    }

    /* ═══════ TTS — voix française (France, pas Québec) ═══════ */
    var NX_VOICE_PRIORITY = ['Microsoft Denise', 'Microsoft Hortense', 'Google français', 'Amélie', 'Audrey', 'Virginie', 'Sophie', 'Marie', 'Alice']
    var _nxCachedVoice = null
    function pickFrenchVoice() {
      if (!window.speechSynthesis) return null
      var voices = window.speechSynthesis.getVoices()
      if (!voices.length) return _nxCachedVoice
      for (var i = 0; i < NX_VOICE_PRIORITY.length; i++) {
        var found = voices.find(function (v) { return v.name.indexOf(NX_VOICE_PRIORITY[i]) !== -1 && v.lang === 'fr-FR' })
        if (found) { _nxCachedVoice = found; return found }
      }
      var fr = voices.find(function (v) { return v.lang === 'fr-FR' })
      if (fr) { _nxCachedVoice = fr; return fr }
      var anyFr = voices.find(function (v) { return v.lang && v.lang.indexOf('fr') === 0 })
      _nxCachedVoice = anyFr || null
      return _nxCachedVoice
    }
    function cleanForSpeech(str) {
      return String(str || '')
        .replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1')
        .replace(/^#{1,6}\s+/gm, '').replace(/^[-*]\s+/gm, '').replace(/`([^`]+)`/g, '$1')
        .replace(/[✦💜🚀💎🌐📱⭐✓►▶🔊📄🧬🎬🎨]/g, '').trim()
    }
    function speakText(idx) {
      if (!window.speechSynthesis) { alert('Synthèse vocale non supportée par ce navigateur.'); return }
      window.speechSynthesis.cancel()
      var m = chatHistories[currentToolId][idx]
      var text = typeof m.content === 'string' ? m.content : (m.content.find(function (c) { return c.type === 'text' }) || {}).text || ''
      var clean = cleanForSpeech(text)
      if (!clean) return
      var utt = new SpeechSynthesisUtterance(clean)
      utt.lang = 'fr-FR'; utt.rate = 0.95; utt.pitch = 1
      var voice = pickFrenchVoice()
      if (voice) utt.voice = voice
      window.speechSynthesis.speak(utt)
    }
    if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = pickFrenchVoice

    function exportSingleMessagePDF(idx) {
      var history = chatHistories[currentToolId] || []
      var m = history[idx]
      if (!m) return
      var tool = tools.find(function (t) { return t.id === currentToolId })
      var text = typeof m.content === 'string' ? m.content : (m.content.find(function (c) { return c.type === 'text' }) || {}).text || ''

      var doc = new window.jspdf.jsPDF()
      var margin = 20, y = 25, maxWidth = 170
      doc.setFontSize(16)
      doc.text(tool ? tool.name : 'Document', margin, y); y += 8
      doc.setFontSize(9); doc.setTextColor(140)
      doc.text(new Date().toLocaleDateString('fr-FR'), margin, y); y += 12
      doc.setTextColor(20); doc.setFontSize(12)

      var paragraphs = text.split(/\n\s*\n/)
      paragraphs.forEach(function (para) {
        var lines = doc.splitTextToSize(para.trim(), maxWidth)
        lines.forEach(function (line) {
          if (y > 280) { doc.addPage(); y = 25 }
          doc.text(line, margin, y)
          y += 7
        })
        y += 5
      })
      doc.save((tool ? tool.name.replace(/[^a-z0-9]+/gi, '-') : 'document') + '-' + Date.now() + '.pdf')
    }

    /* ═══════ EXPORT PDF ═══════ */
    function exportChatPDF() {
      var history = chatHistories[currentToolId] || []
      if (!history.length) { alert('Rien à exporter — la conversation est vide.'); return }
      var tool = tools.find(function (t) { return t.id === currentToolId })
      var doc = new window.jspdf.jsPDF()
      var margin = 15, y = 20, maxWidth = 180
      doc.setFontSize(16); doc.text(tool ? tool.name : 'Conversation', margin, y); y += 10
      doc.setFontSize(10); doc.setTextColor(120)
      doc.text(new Date().toLocaleString('fr-FR'), margin, y); y += 10
      doc.setTextColor(0)

      history.forEach(function (m) {
        var text = typeof m.content === 'string' ? m.content : (m.content.find(function (c) { return c.type === 'text' }) || {}).text || ''
        var label = (m.role === 'user' ? 'Toi : ' : (tool ? tool.name + ' : ' : 'Assistant : '))
        doc.setFontSize(11)
        var lines = doc.splitTextToSize(label + text, maxWidth)
        lines.forEach(function (line) {
          if (y > 280) { doc.addPage(); y = 20 }
          doc.text(line, margin, y)
          y += 6
        })
        y += 4
      })
      doc.save((tool ? tool.name.replace(/[^a-z0-9]+/gi, '-') : 'conversation') + '.pdf')
    }

    function sendMessage() {
      var input = document.getElementById('chat-input')
      var text = input.value.trim()
      if (!text && !pendingImage) return
      var tool = tools.find(function (t) { return t.id === currentToolId })
      chatHistories[currentToolId] = chatHistories[currentToolId] || []

      var content
      if (pendingImage) {
        content = [
          { type: 'text', text: text || 'Décris cette image en détail.' },
          { type: 'image_url', image_url: { url: pendingImage.dataUrl } }
        ]
      } else {
        content = text
      }
      chatHistories[currentToolId].push({ role: 'user', content: content })
      input.value = ''; input.style.height = 'auto'
      clearAttachment()

      var msgsEl = document.getElementById('chat-messages')
      msgsEl.innerHTML = chatHistories[currentToolId].map(renderMsg).join('') + '<div class="msg bot" id="typing"><div class="msg-bubble">…</div></div>'
      msgsEl.scrollTop = msgsEl.scrollHeight
      document.getElementById('btn-send').disabled = true

      fetch('/api/chat', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ toolId: currentToolId, messages: chatHistories[currentToolId] })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        var typing = document.getElementById('typing'); if (typing) typing.remove()
        if (data.error) {
          chatHistories[currentToolId].push({ role: 'assistant', content: '⚠️ Erreur : ' + data.error })
        } else {
          chatHistories[currentToolId].push({ role: 'assistant', content: data.text || '(réponse vide)' })
        }
        msgsEl.innerHTML = chatHistories[currentToolId].map(renderMsg).join('')
        msgsEl.scrollTop = msgsEl.scrollHeight
      })
      .catch(function (e) {
        var typing = document.getElementById('typing'); if (typing) typing.remove()
        chatHistories[currentToolId].push({ role: 'assistant', content: '⚠️ Erreur réseau : ' + e.message })
        msgsEl.innerHTML = chatHistories[currentToolId].map(renderMsg).join('')
      })
      .finally(function () { document.getElementById('btn-send').disabled = false })
    }

    function saveTool(id) {
      var category = document.getElementById('f-category').value
      if (category === 'custom') category = document.getElementById('f-category-custom').value.trim().toLowerCase().replace(/\s+/g,'-') || 'autre'
      var kind = document.getElementById('f-kind').value
      var payload = {
        name: document.getElementById('f-name').value.trim(),
        icon: document.getElementById('f-icon').value.trim() || '⚙️',
        category: category,
        kind: kind,
        providerId: document.getElementById('f-provider').value,
        model: document.getElementById('f-model').value.trim()
      }
      if (kind === 'image') {
        payload.aspect_ratio = document.getElementById('f-aspect').value
      } else {
        payload.system_prompt = document.getElementById('f-prompt').value
        payload.max_tokens = Number(document.getElementById('f-maxtokens').value) || 2000
        payload.temperature = Number(document.getElementById('f-temp').value)
      }
      if (!payload.name || !payload.model) { alert('Nom et modèle sont requis.'); return }

      var req = id ? fetch('/api/tools/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(payload) })
                   : fetch('/api/tools', { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) })

    function renderAudioTool(tool) {
      document.getElementById('panel-title').textContent = tool.name

      var history = audioHistories[tool.id] || []
      var body =
        '<div style="max-width:760px;margin:0 auto 12px">' +
          '<label class="f-label">Prompt (style, ambiance, instruments...)</label>' +
          '<textarea id="audio-prompt" style="min-height:80px" placeholder="ex: piano solo apaisant, ambiance méditation, tempo lent"></textarea>' +
        '</div>' +
        (tool.needs_lyrics ? '<div style="max-width:760px;margin:0 auto 12px">' +
          '<label class="f-label">Paroles</label>' +
          '<textarea id="audio-lyrics" style="min-height:120px" placeholder="[Couplet]\nÉcris tes paroles ici...\n[Refrain]\n..."></textarea>' +
        '</div>' : '') +
        '<div style="max-width:760px;margin:0 auto 20px"><button class="btn-primary" id="audio-gen-btn" onclick="generateAudio()">🎵 Générer</button></div>' +
        '<div id="audio-history" style="max-width:760px;margin:0 auto">' +
        (history.length ? history.map(renderAudioEntry).reverse().join('') : '<div class="chat-empty">Aucune piste générée avec ' + esc(tool.name) + ' pour l\'instant.</div>') +
        '</div>'
      document.getElementById('panel-body').innerHTML = body
    }

    function renderAudioEntry(entry) {
      if (entry.pending) return '<div class="result-box" style="margin-bottom:16px">⏳ ' + esc(entry.prompt) + ' — génération en cours...</div>'
      if (entry.errorMsg) return '<div class="result-box result-error" style="margin-bottom:16px">' + esc(entry.prompt) + ' — ' + esc(entry.errorMsg) + '</div>'
      return '<div style="margin-bottom:16px"><div style="font-size:13px;color:var(--t3);margin-bottom:6px">' + esc(entry.prompt) + '</div>' +
        '<audio controls src="' + entry.url + '" style="width:100%"></audio>' +
        '<div style="margin-top:4px"><a class="btn-mini" href="' + entry.url + '" target="_blank" download>⬇️ Télécharger</a></div></div>'
    }

    function generateAudio() {
      var tool = tools.find(function (t) { return t.id === currentToolId })
      var prompt = document.getElementById('audio-prompt').value.trim()
      var lyrics = tool.needs_lyrics ? document.getElementById('audio-lyrics').value.trim() : ''
      if (!prompt) return
      var btn = document.getElementById('audio-gen-btn')
      btn.disabled = true; btn.textContent = 'Génération en cours...'

      fetch('/api/generate-audio', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ toolId: tool.id, prompt: prompt, lyrics: lyrics || undefined })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        if (data.error) { btn.disabled = false; btn.textContent = '🎵 Générer'; alert('Erreur : ' + data.error); return }
        audioHistories[tool.id] = audioHistories[tool.id] || []
        var entry = { prompt: prompt, pending: true }
        audioHistories[tool.id].push(entry)
        renderAudioTool(tool)
        pollAudio(data.id, tool, entry, btn)
      })
      .catch(function (e) { btn.disabled = false; btn.textContent = '🎵 Générer'; alert('Erreur réseau : ' + e.message) })
    }

    function pollAudio(genId, tool, entry, btn, attempt) {
      attempt = attempt || 0
      if (attempt > 40) { entry.pending = false; entry.errorMsg = 'Timeout — vérifie ton dashboard AIMLAPI.'; renderAudioTool(tool); btn.disabled = false; btn.textContent = '🎵 Générer'; return }
      fetch('/api/generate-audio/status?id=' + encodeURIComponent(genId), { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.status === 'completed' && data.audio_url) {
            entry.pending = false; entry.url = data.audio_url
            renderAudioTool(tool); btn.disabled = false; btn.textContent = '🎵 Générer'
          } else if (data.status === 'error' || data.error) {
            entry.pending = false; entry.errorMsg = data.error ? JSON.stringify(data.error) : 'Échec de la génération'
            renderAudioTool(tool); btn.disabled = false; btn.textContent = '🎵 Générer'
          } else {
            setTimeout(function () { pollAudio(genId, tool, entry, btn, attempt + 1) }, 5000)
          }
        })
        .catch(function () { setTimeout(function () { pollAudio(genId, tool, entry, btn, attempt + 1) }, 7000) })
    }

    function clearAudioHistory() {
      audioHistories[currentToolId] = []
      var tool = tools.find(function (t) { return t.id === currentToolId })
      renderAudioTool(tool)
    }

    function renderEsotericResult(source, data) {
      try {
        if (source === 'horoscope') {
          var h = Array.isArray(data) ? data[0] : data
          return '<div style="font-size:16px;margin-bottom:8px">' + (h.icon || '🔮') + ' <strong>' + esc(h.name || '') + '</strong> <span style="color:var(--t4);font-size:13px">' + esc(h.dates || '') + '</span></div>' +
            '<div>' + esc(h.prediction || h.text || JSON.stringify(h)) + '</div>'
        }
        if (source === 'moonphase') {
          var m = Array.isArray(data) ? data[0] : data
          return (m.moon_image ? '<img src="' + m.moon_image + '" style="width:80px;float:left;margin-right:12px">' : '') +
            '<div><strong>' + esc(m.phase || '') + '</strong> — ' + esc(m.date || '') + '<br>' +
            'Illumination : ' + esc(m.illumination || '?') + '<br>' +
            'Signe : ' + esc(m.moon_sign || '?') + '<br>' +
            'Distance : ' + esc(m.moon_distance || '?') + '</div><div style="clear:both"></div>'
        }
        if (source === 'zenquotes') {
          var q = Array.isArray(data) ? data[0] : data
          return '<div style="font-style:italic;font-size:15px;margin-bottom:6px">« ' + esc(q.q || q.text || '') + ' »</div>' +
            '<div style="color:var(--t4)">— ' + esc(q.a || q.author || 'Inconnu') + '</div>'
        }
        if (source === 'sunrise') {
          var r = data.results || data
          function fmtTime(t) { if (!t) return '?'; var d = new Date(t); return isNaN(d) ? t : d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) }
          var hours = r.day_length ? Math.floor(r.day_length / 3600) + 'h' + Math.round((r.day_length % 3600) / 60) + 'min' : '?'
          return '<div>☀️ Lever : <strong>' + fmtTime(r.sunrise) + '</strong></div>' +
            '<div>🌇 Coucher : <strong>' + fmtTime(r.sunset) + '</strong></div>' +
            '<div style="margin-top:6px;color:var(--t4)">Durée du jour : ' + hours + '</div>'
        }
        return prettyPrint(data)
      } catch (e) {
        return prettyPrint(data)
      }
    }

    /* ═══════ TRANSCRIPTION (Whisper) ═══════ */
    var sttMode = 'file'
    function renderTranscribeTool(tool) {
      document.getElementById('panel-title').textContent = tool.name
      document.getElementById('panel-sub').textContent = 'Transcrit un fichier audio ou vidéo en texte'
      document.getElementById('panel-actions').innerHTML = ''
      document.getElementById('panel-body').innerHTML =

        '<div style="margin-bottom:12px"><select id="stt-mode" onchange="sttMode=this.value;renderTranscribeTool(tools.find(function(t){return t.id===currentToolId}))" style="max-width:220px;margin:0 auto">' +
          '<option value="file"' + (sttMode === 'file' ? ' selected' : '') + '>📁 Fichier depuis mon appareil</option>' +
          '<option value="url"' + (sttMode === 'url' ? ' selected' : '') + '>🔗 Lien direct vers un fichier</option>' +
        '</select></div>' +
        (sttMode === 'file'
          ? '<input type="file" id="stt-file" accept="audio/*,video/*" style="margin-bottom:16px">'
          : '<input type="text" id="stt-url" placeholder="https://.../fichier.mp3" style="margin-bottom:16px"><div style="font-size:11px;color:var(--t4);margin:-10px 0 16px">Doit pointer directement vers un fichier audio/vidéo, pas une page web (ex. pas un lien YouTube — utilise d\'abord "YouTube — Audio rapide" dans Downloader pour obtenir le vrai lien du fichier)</div>') +
        '<div><button class="btn-primary" id="stt-btn" onclick="runTranscribe()">🎙️ Transcrire</button></div>' +
        '<div class="result-box" id="stt-result" style="margin-top:20px;text-align:left;white-space:pre-wrap">—</div>' +
        '<div id="stt-actions" style="margin-top:8px"></div></div>'
    }

    function runTranscribe() {
      var tool = tools.find(function (t) { return t.id === currentToolId })
      var btn = document.getElementById('stt-btn')
      var out = document.getElementById('stt-result')

      if (sttMode === 'url') {
        var urlVal = document.getElementById('stt-url').value.trim()
        if (!urlVal) { alert('Colle un lien direct vers un fichier audio/vidéo.'); return }
        btn.disabled = true; btn.textContent = 'Envoi...'
        out.textContent = 'Envoi...'
        fetch('/api/transcribe', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ toolId: tool.id, audio_url: urlVal })
        })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.error) { btn.disabled = false; btn.textContent = '🎙️ Transcrire'; out.textContent = 'Erreur : ' + data.error; return }
          if (data.done) { btn.disabled = false; btn.textContent = '🎙️ Transcrire'; out.textContent = data.text || '(vide)'; return }
          out.textContent = 'Transcription en cours...'
          pollTranscribe(data.generation_id, btn, out)
        })
        .catch(function (e) { btn.disabled = false; btn.textContent = '🎙️ Transcrire'; out.textContent = 'Erreur réseau : ' + e.message })
        return
      }

      var file = document.getElementById('stt-file').files[0]
      if (!file) { alert('Choisis un fichier audio ou vidéo.'); return }
      btn.disabled = true; btn.textContent = 'Envoi...'
      out.textContent = 'Envoi du fichier...'

      var reader = new FileReader()
      reader.onload = function () {
        fetch('/api/transcribe', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ toolId: tool.id, audio_base64: reader.result })
        })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.error) { btn.disabled = false; btn.textContent = '🎙️ Transcrire'; out.textContent = 'Erreur : ' + data.error; return }
          if (data.done) { btn.disabled = false; btn.textContent = '🎙️ Transcrire'; out.textContent = data.text || '(vide)'; return }
          out.textContent = 'Transcription en cours...'
          pollTranscribe(data.generation_id, btn, out)
        })
        .catch(function (e) { btn.disabled = false; btn.textContent = '🎙️ Transcrire'; out.textContent = 'Erreur réseau : ' + e.message })
      }
      reader.readAsDataURL(file)
    }

    function pollTranscribe(genId, btn, out, attempt) {
      attempt = attempt || 0
      if (attempt > 40) { out.textContent = 'Timeout — réessaie.'; btn.disabled = false; btn.textContent = '🎙️ Transcrire'; return }
      fetch('/api/transcribe/status?id=' + encodeURIComponent(genId), { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          var text = data.results && data.results[0] && data.results[0].transcript
          if (!text && data.status === 'completed') text = JSON.stringify(data)
          if (text) {
            out.textContent = text
            document.getElementById('stt-actions').innerHTML = '<button class="btn-mini" onclick="navigator.clipboard.writeText(document.getElementById(\'stt-result\').textContent)">📋 Copier</button>'
            btn.disabled = false; btn.textContent = '🎙️ Transcrire'
          } else if (data.error) {
            out.textContent = 'Erreur : ' + JSON.stringify(data.error)
            btn.disabled = false; btn.textContent = '🎙️ Transcrire'
          } else {
            setTimeout(function () { pollTranscribe(genId, btn, out, attempt + 1) }, 4000)
          }
        })
        .catch(function () { setTimeout(function () { pollTranscribe(genId, btn, out, attempt + 1) }, 6000) })
    }

    // Transforme n'importe quelle réponse JSON en texte lisible, avec étiquettes en clair
    function prettyPrint(obj, indent) {
      indent = indent || 0
      var pad = indent ? '<div style="margin-left:' + (indent * 16) + 'px">' : '<div>'
      if (Array.isArray(obj)) {
        if (!obj.length) return pad + '<span style="color:var(--t4)">(vide)</span></div>'
        var html = ''
        obj.forEach(function (item) {
          html += (typeof item === 'object' && item !== null) ? prettyPrint(item, indent) : pad + '• ' + esc(String(item)) + '</div>'
        })
        return html
      }
      if (obj && typeof obj === 'object') {
        var out = ''
        Object.keys(obj).forEach(function (k) {
          var label = k.replace(/_/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2')
          label = label.charAt(0).toUpperCase() + label.slice(1)
          var v = obj[k]
          if (v && typeof v === 'object') {
            out += pad + '<strong>' + esc(label) + '</strong></div>' + prettyPrint(v, indent + 1)
          } else if (v !== null && v !== undefined && v !== '') {
            out += pad + '<strong>' + esc(label) + ' :</strong> ' + esc(String(v)) + '</div>'
          }
        })
        return out
      }
      return pad + esc(String(obj)) + '</div>'
    }

    function renderSmartResult(data) {
      var d = data.data || data
      var textKeys = ['articleBody', 'content', 'summary', 'translated_text', 'translatedText', 'paraphrased_text', 'text', 'result', 'transcript', 'transcription', 'intro', 'prediction', 'description', 'analysis']
      var mainText = null, mainTextKey = null
      for (var i = 0; i < textKeys.length; i++) { if (typeof d[textKeys[i]] === 'string' && d[textKeys[i]].length > 3) { mainText = d[textKeys[i]]; mainTextKey = textKeys[i]; break } }

      // Lien de téléchargement : uniquement si le nom du champ indique clairement un résultat généré
      // (jamais juste "url" ou "source_url", qui sont presque toujours l'adresse fournie EN ENTRÉE)
      var fileUrl = null
      if (data.data && typeof data.data.url === 'string' && /^https?:\/\//.test(data.data.url)) fileUrl = data.data.url
      if (!fileUrl) {
        (function find(obj, depth) {
          if (fileUrl || depth > 3 || !obj || typeof obj !== 'object') return
          Object.keys(obj).forEach(function (k) {
            if (fileUrl) return
            var v = obj[k], lk = k.toLowerCase()
            if (typeof v === 'string' && /^https?:\/\//.test(v) && /output|download|video|audio|nwm|play|\.mp4|\.mp3/i.test(lk + ' ' + v)) fileUrl = v
            else if (v && typeof v === 'object') find(v, depth + 1)
          })
        })(d, 0)
      }

      var html = ''
      if (mainText) html += '<div style="white-space:pre-wrap;margin-bottom:14px">' + esc(mainText) + '</div>'
      if (fileUrl) {
        var isImg = /\.(png|jpe?g|webp|gif)(\?|$)/i.test(fileUrl)
        if (isImg) html += '<img src="' + fileUrl + '" style="max-width:100%;border-radius:10px;display:block;margin-bottom:10px">'
        html += '<a class="btn-mini" href="' + fileUrl + '" target="_blank" download>⬇️ Télécharger le résultat</a><br><br>'
      }

      // Le reste des champs (hors texte principal déjà affiché) en clair, jamais en JSON brut
      var rest = {}
      Object.keys(d).forEach(function (k) { if (k !== mainTextKey) rest[k] = d[k] })
      if (Object.keys(rest).length) html += '<div style="font-size:13px;color:var(--t2)">' + prettyPrint(rest) + '</div>'

      if (!mainText && !fileUrl && !Object.keys(rest).length) html += '<div style="color:var(--t3)">Aucun résultat exploitable.</div>'
      return html
    }

    // Analyse simple d'une commande cURL — gère --url, --request, --header, --data, --form
    function parseCurl(text) {
      var flat = text.replace(/\\\r?\n/g, ' ')
      var result = { method: 'GET', url: '', headers: {}, jsonBody: null, formFields: {}, hasForm: false }

      var urlMatch = flat.match(/--url\s+'([^']+)'/) || flat.match(/--url\s+"([^"]+)"/) || flat.match(/--url\s+(\S+)/)
      if (urlMatch) result.url = urlMatch[1]

      var methodMatch = flat.match(/--request\s+(\w+)/i) || flat.match(/-X\s+(\w+)/i)
      if (methodMatch) result.method = methodMatch[1].toUpperCase()

      var headerRe = /--header\s+'([^:]+):\s*([^']*)'/g
      var hm
      while ((hm = headerRe.exec(flat))) { result.headers[hm[1].trim()] = hm[2].trim() }

      var dataMatch = flat.match(/--data(?:-raw)?\s+'([\s\S]*?)'\s*(?=--\w|$)/)
      if (dataMatch) { try { result.jsonBody = JSON.parse(dataMatch[1]) } catch (e) { result.jsonBody = { _raw: dataMatch[1] } } }

      var formRe = /--form\s+'([^=]+)=(?:@"?([^"']*)"?|"?([^"']*)"?)'/g
      var fm
      while ((fm = formRe.exec(flat))) { result.formFields[fm[1].trim()] = fm[2] || fm[3] || ''; result.hasForm = true }

      return result
    }

    function analyzeCurl() {
      var raw = document.getElementById('curl-raw').value
      var parsed = parseCurl(raw)
      if (!parsed.url) { alert('URL introuvable dans ce cURL — vérifie le format.'); return }

      var urlObj
      try { urlObj = new URL(parsed.url) } catch (e) { alert('URL invalide.'); return }

      // Devine quel en-tête sert de clé API
      var authHeaderName = null
      Object.keys(parsed.headers).forEach(function (h) {
        var low = h.toLowerCase()
        if (low.indexOf('key') !== -1 || low.indexOf('token') !== -1 || low === 'authorization') authHeaderName = h
      })

      var queryFields = []
      urlObj.searchParams.forEach(function (v, k) { queryFields.push({ name: k, label: k, location: 'query', default: v }) })
      var bodyFields = []
      if (parsed.jsonBody) Object.keys(parsed.jsonBody).forEach(function (k) { bodyFields.push({ name: k, label: k, location: 'body', default: String(parsed.jsonBody[k]) }) })
      if (parsed.hasForm) Object.keys(parsed.formFields).forEach(function (k) { bodyFields.push({ name: k, label: k, location: 'body', default: parsed.formFields[k] }) })

      pendingParsedCurl = {
        host: urlObj.host, path: urlObj.pathname, method: parsed.method,
        bodyType: parsed.jsonBody ? 'json' : (parsed.hasForm ? 'form' : 'none'),
        authHeaderName: authHeaderName, fields: queryFields.concat(bodyFields)
      }
      renderCurlReview()
    }

            '<div style="max-width:600px;margin:0 auto">' + fieldsHtml +
            '<button class="btn-primary" id="cu-btn" onclick="runCustomApiTool(\'' + full.id + '\')" style="margin-top:8px">✨ Lancer</button>' +
            '<div class="result-box" id="cu-result" style="margin-top:20px;white-space:pre-wrap">—</div></div>'
          window._currentCustomTool = full
        })
    }

    function runCustomApiTool(id) {
      var full = window._currentCustomTool
      var btn = document.getElementById('cu-btn')
      var out = document.getElementById('cu-result')
      btn.disabled = true; btn.textContent = 'En cours...'
      out.textContent = 'Chargement...'

      var fields = {}
      ;(full.fields || []).forEach(function (f) { fields[f.name] = document.getElementById('cu-f-' + f.name).value })

      fetch('/api/custom-tools/call', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ id: id, fields: fields }) })
        .then(function (r) { return r.json() })
        .then(function (data) {
          btn.disabled = false; btn.textContent = '✨ Lancer'
          if (data.error) { out.innerHTML = 'Erreur : ' + esc(data.error); return }
          out.innerHTML = renderSmartResult(data)
        })
        .catch(function (e) { btn.disabled = false; btn.textContent = '✨ Lancer'; out.textContent = 'Erreur réseau : ' + e.message })
    }

    function renderAudioSearchTool(tool) {
      document.getElementById('panel-title').textContent = tool.name
      document.getElementById('panel-sub').textContent = 'Recherche par mots-clés — sons et musiques libres de droit'
      document.getElementById('panel-actions').innerHTML = ''
      document.getElementById('panel-body').innerHTML =
        '<div class="field-row" style="max-width:760px;margin:0 auto 16px">' +
          '<div class="field"><input type="text" id="freesound-q" placeholder="ex: pluie, piano, ambiance forêt" onkeydown="if(event.key===\'Enter\') runFreesoundSearch()"></div>' +
          '<div><button class="btn-primary" onclick="runFreesoundSearch()">Rechercher</button></div>' +
        '</div>' +
        '<div id="freesound-results" style="max-width:760px;margin:0 auto"></div>'
    }

    function runFreesoundSearch() {
      var q = document.getElementById('freesound-q').value.trim()
      if (!q) return
      var out = document.getElementById('freesound-results')
      out.innerHTML = 'Recherche en cours...'
      fetch('/api/freesound-search?q=' + encodeURIComponent(q), { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.error) { out.innerHTML = '<div class="result-box result-error">' + esc(data.error) + '</div>'; return }
          out.innerHTML = (data.results || []).map(function (s) {
            return '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(123,92,255,0.08)">' +
              '<div style="font-size:13px;margin-bottom:4px">' + esc(s.name) + ' <span style="color:var(--t4)">— ' + esc(s.username) + ' · ' + Math.round(s.duration) + 's</span></div>' +
              (s.preview ? '<audio controls src="' + s.preview + '" style="width:100%"></audio>' : '<div style="color:var(--t4);font-size:12px">Aperçu indisponible</div>') +
              '</div>'
          }).join('') || 'Aucun résultat.'
        })
        .catch(function (e) { out.innerHTML = 'Erreur : ' + e.message })
    }

    /* ═══════ VIDÉO — GÉNÉRATION (AIMLAPI, async) ═══════ */
    var videoHistories = {} // toolId -> [{prompt, url, pending, errorMsg}]
    var pendingVideoRef = null

    function renderVideoTool(tool) {
      document.getElementById('panel-title').textContent = tool.name
      document.getElementById('panel-sub').textContent = (providers.find(function (p) { return p.id === tool.providerId }) || {}).name + ' · ' + tool.model
      document.getElementById('panel-actions').innerHTML = '<button class="btn-mini" onclick="clearVideoHistory()">🗑️ Effacer</button>'

      var history = videoHistories[tool.id] || []
      var body =
        '<div style="max-width:760px;margin:0 auto 12px">' +
          '<label class="f-label">Prompt</label>' +
          '<textarea id="video-prompt" style="min-height:80px" placeholder="Décris la scène ou le mouvement voulu..."></textarea>' +
        '</div>' +
        '<div style="max-width:760px;margin:0 auto 12px">' +
          '<label class="f-label">Image de départ (optionnel — pour Image → Vidéo)</label>' +
          '<input type="file" id="video-ref-file" accept="image/*" onchange="handleVideoRefAttachment(event)">' +
          '<div id="video-ref-preview" style="margin-top:8px"></div>' +
        '</div>' +
        '<div style="max-width:760px;margin:0 auto 20px"><button class="btn-primary" id="video-gen-btn" onclick="generateVideo()">🎬 Générer</button></div>' +
        '<div id="video-history" style="max-width:760px;margin:0 auto">' +
        (history.length ? history.map(renderVideoEntry).reverse().join('') : '<div class="chat-empty">Aucune vidéo générée avec ' + esc(tool.name) + ' pour l\'instant.</div>') +
        '</div>'
      document.getElementById('panel-body').innerHTML = body
      pendingVideoRef = null
    }

    function handleVideoRefAttachment(e) {
      var file = e.target.files[0]
      if (!file) return
      var reader = new FileReader()
      reader.onload = function () {
        pendingVideoRef = reader.result
        document.getElementById('video-ref-preview').innerHTML =
          '<img src="' + reader.result + '" style="max-width:140px;border-radius:8px;display:block;margin-bottom:4px">' +
          '<button onclick="clearVideoRefAttachment()" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:12px">✕ Retirer</button>'
      }
      reader.readAsDataURL(file)
    }
    function clearVideoRefAttachment() {
      pendingVideoRef = null
      document.getElementById('video-ref-file').value = ''
      document.getElementById('video-ref-preview').innerHTML = ''
    }

    function renderVideoEntry(entry) {
      if (entry.pending) return '<div class="result-box" style="margin-bottom:16px">⏳ ' + esc(entry.prompt) + ' — génération en cours (peut prendre plusieurs minutes)...</div>'
      if (entry.errorMsg) return '<div class="result-box result-error" style="margin-bottom:16px">' + esc(entry.prompt) + ' — ' + esc(entry.errorMsg) + '</div>'
      return '<div style="margin-bottom:16px"><div style="font-size:13px;color:var(--t3);margin-bottom:6px">' + esc(entry.prompt) + '</div>' +
        '<video controls src="' + entry.url + '" style="width:100%;border-radius:10px"></video>' +
        '<div style="margin-top:4px"><a class="btn-mini" href="' + entry.url + '" target="_blank" download>⬇️ Télécharger</a></div></div>'
    }

    function generateVideo() {
      var tool = tools.find(function (t) { return t.id === currentToolId })
      var prompt = document.getElementById('video-prompt').value.trim()
      if (!prompt) return
      var btn = document.getElementById('video-gen-btn')
      btn.disabled = true; btn.textContent = 'Génération en cours...'

      fetch('/api/generate-video', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ toolId: tool.id, prompt: prompt, image_url: pendingVideoRef || undefined })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        if (data.error) { btn.disabled = false; btn.textContent = '🎬 Générer'; alert('Erreur : ' + data.error); return }
        videoHistories[tool.id] = videoHistories[tool.id] || []
        var entry = { prompt: prompt, pending: true }
        videoHistories[tool.id].push(entry)
        clearVideoRefAttachment()
        renderVideoTool(tool)
        pollVideo(data.id, tool, entry, btn)
      })
      .catch(function (e) { btn.disabled = false; btn.textContent = '🎬 Générer'; alert('Erreur réseau : ' + e.message) })
    }

    function pollVideo(genId, tool, entry, btn, attempt) {
      attempt = attempt || 0
      if (attempt > 60) { entry.pending = false; entry.errorMsg = 'Timeout — vérifie ton dashboard AIMLAPI.'; renderVideoTool(tool); btn.disabled = false; btn.textContent = '🎬 Générer'; return }
      fetch('/api/generate-video/status?id=' + encodeURIComponent(genId), { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.status === 'completed' && data.video_url) {
            entry.pending = false; entry.url = data.video_url
            renderVideoTool(tool); btn.disabled = false; btn.textContent = '🎬 Générer'
          } else if (data.status === 'error' || data.error) {
            entry.pending = false; entry.errorMsg = data.error ? JSON.stringify(data.error) : 'Échec de la génération'
            renderVideoTool(tool); btn.disabled = false; btn.textContent = '🎬 Générer'
          } else {
            setTimeout(function () { pollVideo(genId, tool, entry, btn, attempt + 1) }, 6000)
          }
        })
        .catch(function () { setTimeout(function () { pollVideo(genId, tool, entry, btn, attempt + 1) }, 8000) })
    }

    function clearVideoHistory() {
      videoHistories[currentToolId] = []
      var tool = tools.find(function (t) { return t.id === currentToolId })
      renderVideoTool(tool)
    }

    var heygenAvatars = [], heygenVoices = [], heygenLoaded = false
    function heygenView() {
      currentView = 'heygen'; renderSidebar()
      document.getElementById('panel-title').textContent = 'Clone IA — HeyGen'
      document.getElementById('panel-sub').textContent = 'Avatar parlant à partir d\'un script (Digital Twin ou Photo Avatar)'
      document.getElementById('panel-actions').innerHTML = ''
      document.getElementById('panel-body').innerHTML = '<div id="heygen-body">Chargement des avatars et voix...</div>'

      Promise.all([
        fetch('/api/heygen/avatars', { headers: authHeaders() }).then(function (r) { return r.json() }),
        fetch('/api/heygen/voices', { headers: authHeaders() }).then(function (r) { return r.json() })
      ]).then(function (results) {
        if (results[0].error) { document.getElementById('heygen-body').innerHTML = 'Erreur : ' + esc(results[0].error); return }
        heygenAvatars = results[0].avatars || []
        heygenVoices = results[1].voices || []
        heygenLoaded = true
        renderHeygenForm()
        if (!heygenAvatars.length && results[0].debug_raw) {
          document.getElementById('heygen-body').insertAdjacentHTML('afterbegin',
            '<div class="result-box result-error" style="margin-bottom:16px">Aucun avatar reconnu (' + results[0].raw_groups_count + ' groupe(s) trouvé(s) côté HeyGen). Réponse brute pour diagnostic :<br><br>' +
            esc(JSON.stringify(results[0].debug_raw, null, 2)).substring(0, 3000) + '</div>')
        }
      }).catch(function (e) { document.getElementById('heygen-body').innerHTML = 'Erreur : ' + e.message })
    }

    function renderHeygenForm() {
      var avatarOptions = heygenAvatars.map(function (a) { return '<option value="' + a.id + '">' + esc(a.name) + '</option>' }).join('')
      var voiceOptions = heygenVoices.map(function (v) { return '<option value="' + v.id + '">' + esc(v.name) + (v.language ? ' (' + esc(v.language) + ')' : '') + '</option>' }).join('')

      document.getElementById('heygen-body').innerHTML =
        '<div class="form-card" style="max-width:600px;margin:0 0 24px">' +
        '<div class="panel-header-sub" style="margin-bottom:12px">✨ Créer un nouvel avatar (Photo Avatar) — à partir d\'une photo de toi ou d\'une praticienne</div>' +
        '<div class="field"><label class="f-label">Nom de l\'avatar</label><input type="text" id="hg-new-name" placeholder="ex: Diane Coach"></div>' +
        '<div class="field"><label class="f-label">Photo (visage net, bonne lumière)</label><input type="file" id="hg-new-photo" accept="image/*"></div>' +
        '<button class="btn-primary" id="hg-create-btn" onclick="heygenCreateAvatar()">🧬 Créer l\'avatar</button>' +
        '<div id="hg-create-result" style="margin-top:12px;font-size:12px;color:var(--t3)"></div>' +
        '</div>' +
        '<div class="field-row"><div class="field"><label class="f-label">Avatar (' + heygenAvatars.length + ')</label><select id="hg-avatar">' + avatarOptions + '</select></div>' +
        '<div class="field"><label class="f-label">Voix (' + heygenVoices.length + ')</label><select id="hg-voice">' + voiceOptions + '</select></div></div>' +
        '<div class="field"><label class="f-label">Script (ce que l\'avatar va dire)</label><textarea id="hg-script" style="min-height:120px" placeholder="Bonjour, je suis..."></textarea></div>' +
        '<button class="btn-primary" id="hg-generate" onclick="heygenGenerate()">🎬 Générer la vidéo</button>' +
        '<div id="hg-result" style="margin-top:20px"></div>'
    }

    function heygenCreateAvatar() {
      var name = document.getElementById('hg-new-name').value.trim()
      var fileInput = document.getElementById('hg-new-photo')
      var file = fileInput.files[0]
      var resultEl = document.getElementById('hg-create-result')
      var btn = document.getElementById('hg-create-btn')
      if (!name) { alert('Donne un nom à l\'avatar.'); return }
      if (!file) { alert('Choisis une photo.'); return }

      btn.disabled = true; btn.textContent = 'Envoi de la photo...'
      resultEl.textContent = ''

      var reader = new FileReader()
      reader.onload = function () {
        fetch('/api/heygen/create-avatar', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ name: name, image_base64: reader.result })
        })
        .then(function (r) { return r.json() })
        .then(function (data) {
          btn.disabled = false; btn.textContent = '🧬 Créer l\'avatar'
          if (data.error) { resultEl.innerHTML = '<span style="color:#ff8fab">Erreur : ' + esc(data.error) + '</span>'; return }
          resultEl.innerHTML = '<span style="color:var(--green)">✓ Avatar "' + esc(name) + '" créé — il apparaît dans la liste ci-dessous.</span>'
          heygenView()
        })
        .catch(function (e) {
          btn.disabled = false; btn.textContent = '🧬 Créer l\'avatar'
          resultEl.innerHTML = '<span style="color:#ff8fab">Erreur réseau : ' + e.message + '</span>'
        })
      }
      reader.readAsDataURL(file)
    }

    function heygenGenerate() {
      var avatarId = document.getElementById('hg-avatar').value
      var voiceId = document.getElementById('hg-voice').value
      var script = document.getElementById('hg-script').value.trim()
      if (!script) { alert('Écris un script.'); return }

      var btn = document.getElementById('hg-generate')
      var resultEl = document.getElementById('hg-result')
      btn.disabled = true; btn.textContent = 'Envoi...'
      resultEl.innerHTML = '<div class="result-box">Soumission à HeyGen...</div>'

      fetch('/api/heygen/generate', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ avatar_id: avatarId, voice_id: voiceId, script: script })
      })
      .then(function (r) { return r.json() })
      .then(function (data) {
        if (data.error) { resultEl.innerHTML = '<div class="result-box result-error">Erreur : ' + esc(data.error) + '</div>'; btn.disabled = false; btn.textContent = '🎬 Générer la vidéo'; return }
        resultEl.innerHTML = '<div class="result-box">Génération en cours (id: ' + esc(data.video_id) + ')... peut prendre 1 à 5 minutes.</div>'
        heygenPoll(data.video_id, btn, resultEl)
      })
      .catch(function (e) {
        resultEl.innerHTML = '<div class="result-box result-error">Erreur réseau : ' + e.message + '</div>'
        btn.disabled = false; btn.textContent = '🎬 Générer la vidéo'
      })
    }

    function heygenPoll(videoId, btn, resultEl, attempt) {
      attempt = attempt || 0
      if (attempt > 60) { resultEl.innerHTML = '<div class="result-box result-error">Timeout — vérifie plus tard depuis ton dashboard HeyGen.</div>'; btn.disabled = false; btn.textContent = '🎬 Générer la vidéo'; return }

      fetch('/api/heygen/status?video_id=' + encodeURIComponent(videoId), { headers: authHeaders() })
        .then(function (r) { return r.json() })
        .then(function (data) {
          if (data.status === 'completed' && data.video_url) {
            resultEl.innerHTML = '<video src="' + data.video_url + '" controls style="width:100%;max-width:500px;border-radius:12px;display:block"></video>' +
              '<div style="margin-top:10px"><a class="btn-mini" href="' + data.video_url + '" target="_blank" download>⬇️ Télécharger</a></div>'
            btn.disabled = false; btn.textContent = '🎬 Générer la vidéo'
          } else if (data.status === 'failed') {
            resultEl.innerHTML = '<div class="result-box result-error">Échec HeyGen : ' + esc(data.error ? JSON.stringify(data.error) : 'inconnu') + '</div>'
            btn.disabled = false; btn.textContent = '🎬 Générer la vidéo'
          } else {
            resultEl.innerHTML = '<div class="result-box">Statut : ' + esc(data.status || 'en cours') + '... (' + attempt + '/60)</div>'
            setTimeout(function () { heygenPoll(videoId, btn, resultEl, attempt + 1) }, 5000)
          }
        })
        .catch(function () { setTimeout(function () { heygenPoll(videoId, btn, resultEl, attempt + 1) }, 8000) })
    }
  </script>

</body>
</html>
